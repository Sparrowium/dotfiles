# Alacritty config - Nord theme

[colors.primary]
background = "#2E3440"  # Nord0 - Polar night (darkest)
foreground = "#D8DEE9"  # Nord6 - Snow storm (lightest)
dim_foreground = "#A5ABB6"  # Nord3 - Polar night (brightened)
bright_foreground = "#ECEFF4"  # Nord6 (brighter)

[colors.cursor]
text = "#2E3440"
cursor = "#D8DEE9"

[colors.vi_mode_cursor]
text = "#2E3440"
cursor = "#D8DEE9"  # Nord9

[colors.search.matches]
foreground = "#2E3440"
background = "#88C0D0"  # Nord9

[colors.search.focused_match]
foreground = "#2E3440"
background = "#A3BE8C"  # Nord14

[colors.footer_bar]
background = "#434C5E"
foreground = "#D8DEE9"

[colors.hints.start]
foreground = "#2E3440"
background = "#EBCB8B"  # Nord13

[colors.hints.end]
foreground = "#2E3440"
background = "#D08770"  # Nord12

[colors.selection]
text = "#2E3440"
background = "#4C566A"  # Nord10

[colors.normal]
black = "#3B4252"      # Nord1
red = "#BF616A"        # Nord11
green = "#A3BE8C"      # Nord14
yellow = "#EBCB8B"     # Nord13
blue = "#81A1C1"       # Nord9
magenta = "#B48EAD"    # Nord15
cyan = "#88C0D0"       # Nord8
white = "#E5E9F0"      # Nord5

[colors.bright]
black = "#4C566A"      # Nord3
red = "#BF616A"        # Nord11
green = "#A3BE8C"      # Nord14
yellow = "#EBCB8B"     # Nord13
blue = "#81A1C1"       # Nord9
magenta = "#B48EAD"    # Nord15
cyan = "#8FBCBB"       # Nord7
white = "#ECEFF4"      # Nord6

[colors.dim]
black = "#373e4d"
red = "#94545d"
green = "#809575"
yellow = "#b29e75"
blue = "#68809a"
magenta = "#8c738c"
cyan = "#6d96a5"
white = "#aeb3bb"

[[colors.indexed_colors]]
index = 16
color = "#D08770"      # Nord12

[[colors.indexed_colors]]
index = 17
color = "#5E81AC"      # Nord10

[window]
opacity = 0.95# Slightly increased for Nord's darker background

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"
